version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: mindmesh-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindmesh
    ports: ['5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mindmesh-redis
    ports: ['6379:6379']
    volumes: [redis_data:/data]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: mindmesh-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mindmesh
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 5000
    ports: ['5000:5000']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ['./backend/src:/app/src', './backend/prisma:/app/prisma']
    command: npm run dev
    restart: unless-stopped

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    container_name: mindmesh-frontend
    env_file: ./frontend/.env.local
    environment:
      BACKEND_URL: http://backend:5000
      NEXTAUTH_URL: http://localhost:3000
    ports: ['3000:3000']
    depends_on: [backend]
    volumes: ['./frontend/app:/app/app', './frontend/components:/app/components']
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
